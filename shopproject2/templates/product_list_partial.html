{% load static %}
{% for product in product_list %}
<div class="col-lg-6">
  <div class="card lg-6">
    <img src="{% static 'bootstrap4/default.jpg' %}" class="card-img-top" alt="...">
    <div class="card-body">
      <h5 class="card-title"><a href="{% url 'product-detail' product.slug %}">{{product.name}}</a></h5>
      <p class="card-text">Some quick example text to build on the card title and make up the bulk of the card's content.</p>
      <a href="{% url 'add_to_basket' product.id %}" class="btn btn-primary">Add to basket</a>
    </div>
  </div>
</div>
{% endfor %}
